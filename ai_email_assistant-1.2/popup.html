<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Email Agent</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <button class="dark-mode-toggle" id="dark-mode-toggle" aria-label="Toggle Dark Mode">
                <span class="dark-icon">🌙</span>
                <span class="light-icon" style="display: none;">☀️</span>
            </button>
            <div class="profile-dropdown" id="profile-dropdown">
                <div class="profile-icon" id="profile-icon" title="User Profile">
                    <i class="fas fa-user"></i>
                </div>
                <div class="profile-dropdown-content" id="profile-dropdown-content">
                    <div class="profile-info" id="profile-info" style="display: none;">
                        <span id="user-name"></span>
                        <span id="user-email" class="email-text"></span>
                    </div>
                    <button id="login-button" class="dropdown-btn">Login with Google</button>
                    <button id="logout-button" class="dropdown-btn">Logout</button>
                    <button id="settings-button" class="dropdown-btn">Settings</button>
                </div>
            </div>
        </div>

        <div class="user-status" id="user-status">
            <span>Not logged in.</span>
        </div>

        <h1>AI Email Agent</h1>

        <section class="columns">
            <section class="column left-column">
                <h2>Inbox</h2>
                <button id="fetch-emails-button" class="btn">Refresh Emails</button>
                <div id="email-list" class="email-list"></div>
            </section>
            <section class="column right-column">
                <h2>AI Features</h2>
                <div class="card">
                    <h3>Generate Email</h3>
                    <textarea id="prompt" placeholder="Enter your prompt (e.g., 'Write an email to thank John for the meeting')"></textarea>
                    <button id="generate-email-button" class="btn">Generate Email</button>
                </div>
                <div class="card">
                    <h3>Generated Email (Editable)</h3>
                    <textarea id="generated-email" placeholder="Generated email will appear here..." readonly></textarea>
                    <div class="button-group">
                        <button id="edit-email-button" class="text-btn">Edit Email</button>
                        <button id="send-generated-email-button" class="text-btn">Send Email</button>
                    </div>
                </div>
                <div class="speech-settings">
                    <h3>Speech Settings</h3>
                    <label>
                        Voice:
                        <select id="voice-select"></select>
                    </label>
                    <label>
                        Speed:
                        <input type="range" id="speech-speed" min="0.5" max="2" step="0.1" value="1">
                    </label>
                    <label>
                        Include Subjects: <input type="checkbox" id="include-subjects" checked>
                    </label>
                </div>
            </section>
        </section>

        <div id="loading" class="loading-spinner">
            <div class="spinner"></div>
            <p>Processing...</p>
        </div>

        <div id="message" class="message"></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
